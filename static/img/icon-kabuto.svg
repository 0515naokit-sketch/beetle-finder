    <path d="M44,22 C42,12 44,4 50,2 C56,4 58,12 56,22
             C53,20 50,19 47,20 Z"/>
    <!-- 頭角の先端 -->
    <ellipse cx="50" cy="3" rx="4" ry="3"/>
    <!-- 小顎(左) -->
    <path d="M38,28 C32,22 26,20 22,24 C20,27 22,31 26,30 C29,29 32,32 34,34 Z"/>
    <!-- 小顎(右) -->
    <path d="M62,28 C68,22 74,20 78,24 C80,27 78,31 74,30 C71,29 68,32 66,34 Z"/>
    <!-- 頭部 丸め -->
    <ellipse cx="50" cy="33" rx="16" ry="12"/>
    <!-- 前胸板 幅広・丸い -->
    <ellipse cx="50" cy="51" rx="21" ry="14"/>
    <!-- 上翅 丸め -->
    <ellipse cx="50" cy="79" rx="19" ry="22"/>
    <!-- 前脚(左) -->
    <path d="M30,44 C22,38 12,36 8,40" stroke="#1b5e20" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <!-- 中脚(左) -->
    <path d="M29,53 C20,51 10,53 6,58" stroke="#1b5e20" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <!-- 後脚(左) -->
    <path d="M31,66 C23,71 13,75 9,81" stroke="#1b5e20" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <!-- 前脚(右) -->
    <path d="M70,44 C78,38 88,36 92,40" stroke="#1b5e20" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <!-- 中脚(右) -->
    <path d="M71,53 C80,51 90,53 94,58" stroke="#1b5e20" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <!-- 後脚(右) -->
    <path d="M69,66 C77,71 87,75 91,81" stroke="#1b5e20" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  </g>
