  <line x1="20" y1="23" x2="20" y2="40" stroke="#3d1e00" stroke-width="1"/>
  <!-- 触角（左） -->
  <path d="M17 8.5 Q15 5 13 3" stroke="#5c2d00" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 触角（右） -->
  <path d="M23 8.5 Q25 5 27 3" stroke="#5c2d00" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 左脚（3対） -->
  <line x1="13" y1="17" x2="3" y2="14" stroke="#5c2d00" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="12" y1="22" x2="2" y2="22" stroke="#5c2d00" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="12" y1="28" x2="3" y2="32" stroke="#5c2d00" stroke-width="2.2" stroke-linecap="round"/>
  <!-- 右脚 -->
  <line x1="27" y1="17" x2="37" y2="14" stroke="#5c2d00" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="28" y1="22" x2="38" y2="22" stroke="#5c2d00" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="28" y1="28" x2="37" y2="32" stroke="#5c2d00" stroke-width="2.2" stroke-linecap="round"/>
</svg>
