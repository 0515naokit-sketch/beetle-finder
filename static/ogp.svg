<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- 背景 -->
  <rect width="1200" height="630" fill="#0d1f0d"/>
  <!-- 上部グラデーションバー -->
  <rect width="1200" height="8" fill="#2e7d32"/>

  <!-- 地図風ドット（装飾） -->
  <circle cx="960" cy="315" r="180" fill="none" stroke="#1a3d1a" stroke-width="60" opacity=".5"/>
  <circle cx="960" cy="315" r="100" fill="none" stroke="#1a3d1a" stroke-width="40" opacity=".5"/>
  <!-- ダイヤモンドマーカー -->
  <rect x="920" y="255" width="80" height="80" fill="#e53935" transform="rotate(45 960 295)" rx="4" opacity=".9"/>
  <rect x="1030" y="280" width="55" height="55" fill="#fb8c00" transform="rotate(45 1057 307)" rx="3" opacity=".85"/>
  <rect x="840" y="310" width="45" height="45" fill="#4caf50" transform="rotate(45 862 332)" rx="3" opacity=".8"/>
  <rect x="990" y="370" width="40" height="40" fill="#4caf50" transform="rotate(45 1010 390)" rx="3" opacity=".7"/>

  <!-- メインテキスト -->
  <text x="100" y="220" font-family="'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif"
        font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">クワガタ採集</text>
  <text x="100" y="310" font-family="'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif"
        font-size="72" font-weight="700" fill="#66bb6a" letter-spacing="-1">スポット検索</text>

  <!-- サブテキスト -->
  <text x="100" y="380" font-family="'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif"
        font-size="32" fill="#a5d6a7" opacity=".9">郵便番号を入力するだけ。全国対応・無料。</text>

  <!-- タグ行 -->
  <rect x="100" y="420" width="130" height="38" rx="19" fill="#1b5e20"/>
  <text x="165" y="445" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#a5d6a7">🌙 月齢連動</text>

  <rect x="245" y="420" width="140" height="38" rx="19" fill="#1b5e20"/>
  <text x="315" y="445" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#a5d6a7">⛰ 標高対応</text>

  <rect x="400" y="420" width="160" height="38" rx="19" fill="#1b5e20"/>
  <text x="480" y="445" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#a5d6a7">👨‍👩‍👧 家族向け</text>

  <rect x="575" y="420" width="150" height="38" rx="19" fill="#1b5e20"/>
  <text x="650" y="445" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#a5d6a7">🔬 玄人モード</text>

  <!-- URL -->
  <text x="100" y="560" font-family="monospace" font-size="26" fill="#4a7c4e">beetle-finder.onrender.com</text>

  <!-- 下部バー -->
  <rect y="622" width="1200" height="8" fill="#2e7d32"/>
</svg>
